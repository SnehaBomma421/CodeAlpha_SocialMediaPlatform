<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search — SocialSphere</title>
  <meta name="theme-color" content="#FF7EB6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/feed.css" />
</head>
<body>
  <!-- ─── Navigation ────────────────────────────────────── -->
  <nav class="navbar glass" id="navbar">
    <div class="nav-container">
      <a href="feed.html" class="nav-brand">
        <div class="logo-icon"><i class="fas fa-globe"></i></div>
        <span class="logo-text">SocialSphere</span>
      </a>
      <div class="nav-search" id="navSearch">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search SocialSphere..." id="globalSearchInput" />
      </div>
      <div class="nav-links">
        <a href="feed.html" class="nav-link" title="Home"><i class="fas fa-home"></i></a>
        <a href="create-post.html" class="nav-link" title="Create Post"><i class="fas fa-plus-square"></i></a>
        <a href="explore.html" class="nav-link" title="Explore"><i class="fas fa-compass"></i></a>
        <a href="notifications.html" class="nav-link notification-bell" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="badge" id="notifBadge" style="display:none">0</span>
        </a>
        <a href="profile.html" class="nav-link nav-avatar-link" title="Profile">
          <img src="https://ui-avatars.com/api/?name=User&background=FF7EB6&color=fff&size=32" alt="Profile" class="nav-avatar" id="navAvatar" />
        </a>
        <button class="theme-toggle" id="themeToggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <button class="nav-link" id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <!-- ─── Search Content ────────────────────────────────── -->
  <div class="search-container">
    <div class="search-hero glass-card">
      <h1><i class="fas fa-search"></i> Search SocialSphere</h1>
      <div class="search-box">
        <i class="fas fa-search"></i>
        <input
          type="text"
          id="searchInput"
          placeholder="Search users, posts, or #hashtags..."
          autofocus
        />
        <button class="search-clear" id="searchClear" style="display:none">
          <i class="fas fa-times"></i>
        </button>
      </div>
      <div class="search-type-tabs">
        <button class="search-type-btn active" data-type="users">
          <i class="fas fa-users"></i> People
        </button>
        <button class="search-type-btn" data-type="posts">
          <i class="fas fa-file-alt"></i> Posts
        </button>
        <button class="search-type-btn" data-type="hashtags">
          <i class="fas fa-hashtag"></i> Hashtags
        </button>
      </div>
    </div>

    <!-- Recent Searches -->
    <div id="recentSearches" class="recent-searches">
      <h3>Recent Searches</h3>
      <div id="recentList"></div>
    </div>

    <!-- Search Results -->
    <div id="searchResults" class="search-results" style="display:none">
      <!-- Users Results -->
      <div id="userResults" class="search-section"></div>
      <!-- Posts Results -->
      <div id="postResults" class="search-section"></div>
      <!-- Hashtag Results -->
      <div id="hashtagResults" class="search-section"></div>
    </div>

    <!-- Empty State -->
    <div id="searchEmpty" class="empty-state" style="display:none">
      <div class="empty-icon"><i class="fas fa-search"></i></div>
      <h3>No results found</h3>
      <p>Try a different search term or browse trending topics.</p>
    </div>

    <!-- Loading -->
    <div id="searchLoader" class="feed-loader" style="display:none">
      <div class="spinner"></div>
      <span>Searching...</span>
    </div>
  </div>

  <!-- ─── Toast Container ────────────────────────────────── -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/search.js"></script>
</body>
</html>
