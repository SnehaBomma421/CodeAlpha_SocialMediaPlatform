<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | SocialSphere</title>
  <meta name="theme-color" content="#FF7EB6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-bg" aria-hidden="true">
    <div class="auth-circle auth-circle-1"></div>
    <div class="auth-circle auth-circle-2"></div>
    <div class="auth-circle auth-circle-3"></div>
  </div>
  <div class="error-page">
    <div class="error-content glass-card">
      <div class="error-code">404</div>
      <div class="error-icon">
        <i class="fas fa-map-signs"></i>
      </div>
      <h1>Page Not Found</h1>
      <p>The page you're looking for doesn't exist or has been moved.</p>
      <div class="error-actions">
        <a href="feed.html" class="btn btn-primary btn-lg">
          <i class="fas fa-home"></i> Go Home
        </a>
        <a href="explore.html" class="btn btn-outline btn-lg">
          <i class="fas fa-compass"></i> Explore
        </a>
      </div>
    </div>
  </div>
</body>
</html>
