<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Feed — SocialSphere</title>
  <meta name="theme-color" content="#FF7EB6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/feed.css" />
</head>
<body>
  <!-- ─── Navigation ────────────────────────────────────── -->
  <nav class="navbar glass" id="navbar">
    <div class="nav-container">
      <a href="feed.html" class="nav-brand">
        <div class="logo-icon">
          <i class="fas fa-globe"></i>
        </div>
        <span class="logo-text">SocialSphere</span>
      </a>

      <div class="nav-search" id="navSearch">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search SocialSphere..." id="globalSearchInput" />
      </div>

      <div class="nav-links">
        <a href="feed.html" class="nav-link active" title="Home">
          <i class="fas fa-home"></i>
        </a>
        <a href="create-post.html" class="nav-link" title="Create Post">
          <i class="fas fa-plus-square"></i>
        </a>
        <a href="explore.html" class="nav-link" title="Explore">
          <i class="fas fa-compass"></i>
        </a>
        <a href="notifications.html" class="nav-link notification-bell" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="badge" id="notifBadge" style="display:none">0</span>
        </a>
        <a href="profile.html" class="nav-link nav-avatar-link" title="Profile">
          <img src="https://ui-avatars.com/api/?name=User&background=FF7EB6&color=fff&size=32" alt="Profile" class="nav-avatar" id="navAvatar" />
        </a>
        <button class="theme-toggle" id="themeToggle" title="Toggle Theme">
          <i class="fas fa-moon"></i>
        </button>
        <button class="nav-link" id="logoutBtn" title="Logout">
          <i class="fas fa-sign-out-alt"></i>
        </button>
      </div>

      <button class="mobile-menu-btn" id="mobileMenuBtn">
        <i class="fas fa-bars"></i>
      </button>
    </div>

    <div class="mobile-search" id="mobileSearch">
      <i class="fas fa-search"></i>
      <input type="text" placeholder="Search users or posts..." id="mobileSearchInput" />
    </div>
  </nav>

  <!-- ─── Main Layout ───────────────────────────────────── -->
  <div class="feed-layout">
    <!-- Left Sidebar -->
    <aside class="sidebar sidebar-left" id="sidebarLeft">
      <div class="sidebar-sticky">
        <!-- User Quick Info -->
        <div class="sidebar-card glass-card" id="userQuickInfo">
          <div class="quick-info-skeleton skeleton-pulse">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line w-70"></div>
              <div class="skeleton-line w-50"></div>
            </div>
          </div>
        </div>

        <!-- Trending Hashtags -->
        <div class="sidebar-card glass-card">
          <h3 class="sidebar-title">
            <i class="fas fa-fire"></i>
            Trending
          </h3>
          <div id="trendingList">
            <div class="skeleton-line skeleton-pulse"></div>
            <div class="skeleton-line skeleton-pulse"></div>
            <div class="skeleton-line skeleton-pulse"></div>
          </div>
        </div>
      </div>
    </aside>

    <!-- Main Feed -->
    <main class="feed-main">
      <!-- Create Post Shortcut -->
      <div class="create-post-shortcut glass-card" onclick="window.location.href='create-post.html'">
        <img src="https://ui-avatars.com/api/?name=User&background=FF7EB6&color=fff&size=40" alt="" class="shortcut-avatar" id="shortcutAvatar" />
        <div class="shortcut-input">
          <span>What's on your mind?</span>
        </div>
        <div class="shortcut-icons">
          <i class="fas fa-image" title="Add Photo"></i>
        </div>
      </div>

      <!-- Feed Posts -->
      <div id="feedPosts">
        <!-- Skeleton Loading -->
        <div class="post-skeleton skeleton-pulse">
          <div class="skeleton-header">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line w-40"></div>
              <div class="skeleton-line w-20"></div>
            </div>
          </div>
          <div class="skeleton-image"></div>
          <div class="skeleton-lines">
            <div class="skeleton-line w-60"></div>
            <div class="skeleton-line w-80"></div>
          </div>
        </div>
        <div class="post-skeleton skeleton-pulse">
          <div class="skeleton-header">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line w-40"></div>
              <div class="skeleton-line w-20"></div>
            </div>
          </div>
          <div class="skeleton-image"></div>
          <div class="skeleton-lines">
            <div class="skeleton-line w-60"></div>
            <div class="skeleton-line w-80"></div>
          </div>
        </div>
      </div>

      <!-- Loading Spinner -->
      <div id="feedLoader" class="feed-loader" style="display:none">
        <div class="spinner"></div>
        <span>Loading more posts...</span>
      </div>

      <!-- No Posts -->
      <div id="noPosts" class="empty-state" style="display:none">
        <div class="empty-icon">
          <i class="fas fa-newspaper"></i>
        </div>
        <h3>No Posts Yet</h3>
        <p>Follow users to see their posts in your feed.</p>
        <a href="explore.html" class="btn btn-primary">Discover People</a>
      </div>

      <!-- End of Feed -->
      <div id="feedEnd" class="feed-end" style="display:none">
        <span>You've reached the end of your feed</span>
      </div>
    </main>

    <!-- Right Sidebar -->
    <aside class="sidebar sidebar-right" id="sidebarRight">
      <div class="sidebar-sticky">
        <!-- Suggestions -->
        <div class="sidebar-card glass-card">
          <h3 class="sidebar-title">
            <i class="fas fa-user-plus"></i>
            Suggested for You
          </h3>
          <div id="suggestionsList">
            <div class="skeleton-line skeleton-pulse"></div>
            <div class="skeleton-line skeleton-pulse"></div>
            <div class="skeleton-line skeleton-pulse"></div>
          </div>
        </div>

        <!-- Footer Links -->
        <div class="sidebar-footer">
          <a href="index.html">About</a>
          <a href="#">Privacy</a>
          <a href="#">Terms</a>
          <p>&copy; 2024 SocialSphere</p>
        </div>
      </div>
    </aside>
  </div>

  <!-- ─── Toast Container ────────────────────────────────── -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
