<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Explore — SocialSphere</title>
  <meta name="theme-color" content="#FF7EB6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/feed.css" />
</head>
<body>
  <!-- ─── Navigation ────────────────────────────────────── -->
  <nav class="navbar glass" id="navbar">
    <div class="nav-container">
      <a href="feed.html" class="nav-brand">
        <div class="logo-icon"><i class="fas fa-globe"></i></div>
        <span class="logo-text">SocialSphere</span>
      </a>
      <div class="nav-search" id="navSearch">
        <i class="fas fa-search search-icon"></i>
        <input type="text" placeholder="Search SocialSphere..." id="globalSearchInput" />
      </div>
      <div class="nav-links">
        <a href="feed.html" class="nav-link" title="Home"><i class="fas fa-home"></i></a>
        <a href="create-post.html" class="nav-link" title="Create Post"><i class="fas fa-plus-square"></i></a>
        <a href="explore.html" class="nav-link active" title="Explore"><i class="fas fa-compass"></i></a>
        <a href="notifications.html" class="nav-link notification-bell" title="Notifications">
          <i class="fas fa-bell"></i>
          <span class="badge" id="notifBadge" style="display:none">0</span>
        </a>
        <a href="profile.html" class="nav-link nav-avatar-link" title="Profile">
          <img src="https://ui-avatars.com/api/?name=User&background=FF7EB6&color=fff&size=32" alt="" class="nav-avatar" id="navAvatar" />
        </a>
        <button class="theme-toggle" id="themeToggle" title="Toggle Theme"><i class="fas fa-moon"></i></button>
        <button class="nav-link" id="logoutBtn" title="Logout"><i class="fas fa-sign-out-alt"></i></button>
      </div>
      <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fas fa-bars"></i></button>
    </div>
  </nav>

  <!-- ─── Explore Content ───────────────────────────────── -->
  <div class="explore-container">
    <div class="explore-header glass-card">
      <h1><i class="fas fa-compass"></i> Explore</h1>
      <p>Discover trending content and new people</p>
    </div>

    <!-- Trending Hashtags -->
    <section class="explore-section">
      <h2 class="section-title"><i class="fas fa-fire"></i> Trending Hashtags</h2>
      <div class="hashtag-grid" id="exploreHashtags">
        <div class="skeleton-line skeleton-pulse"></div>
        <div class="skeleton-line skeleton-pulse"></div>
        <div class="skeleton-line skeleton-pulse"></div>
      </div>
    </section>

    <!-- Suggested Users -->
    <section class="explore-section">
      <h2 class="section-title"><i class="fas fa-user-plus"></i> Suggested Users</h2>
      <div class="suggested-users-grid" id="exploreUsers">
        <div class="skeleton-line skeleton-pulse"></div>
        <div class="skeleton-line skeleton-pulse"></div>
        <div class="skeleton-line skeleton-pulse"></div>
      </div>
    </section>

    <!-- Recent Posts -->
    <section class="explore-section">
      <h2 class="section-title"><i class="fas fa-clock"></i> Recent Posts</h2>
      <div id="explorePosts">
        <div class="post-skeleton skeleton-pulse">
          <div class="skeleton-header">
            <div class="skeleton-avatar"></div>
            <div class="skeleton-lines">
              <div class="skeleton-line w-40"></div>
              <div class="skeleton-line w-20"></div>
            </div>
          </div>
          <div class="skeleton-image"></div>
          <div class="skeleton-lines">
            <div class="skeleton-line w-60"></div>
            <div class="skeleton-line w-80"></div>
          </div>
        </div>
      </div>
    </section>
  </div>

  <!-- ─── Toast Container ────────────────────────────────── -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="js/api.js"></script>
  <script src="js/app.js"></script>
  <script src="js/feed.js"></script>
</body>
</html>
