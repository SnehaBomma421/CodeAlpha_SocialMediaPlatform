<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — SocialSphere</title>
  <meta name="theme-color" content="#FF7EB6" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Nunito:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/auth.css" />
</head>
<body>
  <div class="auth-container">
    <!-- Background decoration -->
    <div class="auth-bg">
      <div class="auth-circle auth-circle-1"></div>
      <div class="auth-circle auth-circle-2"></div>
      <div class="auth-circle auth-circle-3"></div>
    </div>

    <div class="auth-card glass-card">
      <!-- Brand -->
      <a href="index.html" class="auth-brand">
        <div class="logo-icon">
          <i class="fas fa-globe"></i>
        </div>
        <span class="logo-text">SocialSphere</span>
      </a>

      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join the community today</p>

      <!-- Register Form -->
      <form id="registerForm" class="auth-form" novalidate>
        <!-- Avatar Upload -->
        <div class="avatar-upload">
          <div class="avatar-preview" id="avatarPreview">
            <img src="https://ui-avatars.com/api/?name=New+User&background=FF7EB6&color=fff&size=128" alt="Avatar" id="avatarImg" />
            <div class="avatar-overlay">
              <i class="fas fa-camera"></i>
              <span>Upload Photo</span>
            </div>
          </div>
          <input type="file" id="avatarInput" accept="image/*" hidden />
        </div>

        <!-- Name -->
        <div class="form-group">
          <label for="name">
            <i class="fas fa-user"></i>
            Full Name
          </label>
          <input
            type="text"
            id="name"
            name="name"
            placeholder="John Doe"
            required
            minlength="2"
            maxlength="50"
          />
          <span class="error-message" id="nameError"></span>
        </div>

        <!-- Username -->
        <div class="form-group">
          <label for="username">
            <i class="fas fa-at"></i>
            Username
          </label>
          <input
            type="text"
            id="username"
            name="username"
            placeholder="johndoe"
            required
            minlength="3"
            maxlength="30"
            pattern="[a-zA-Z0-9_]+"
          />
          <span class="error-message" id="usernameError"></span>
        </div>

        <!-- Email -->
        <div class="form-group">
          <label for="email">
            <i class="fas fa-envelope"></i>
            Email Address
          </label>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="you@example.com"
            required
            autocomplete="email"
          />
          <span class="error-message" id="emailError"></span>
        </div>

        <!-- Password -->
        <div class="form-group">
          <label for="password">
            <i class="fas fa-lock"></i>
            Password
          </label>
          <div class="password-input-wrapper">
            <input
              type="password"
              id="password"
              name="password"
              placeholder="Min. 6 characters"
              required
              minlength="6"
            />
            <button type="button" class="password-toggle" id="passwordToggle" tabindex="-1">
              <i class="fas fa-eye"></i>
            </button>
          </div>
          <span class="error-message" id="passwordError"></span>
          <div class="password-strength" id="passwordStrength">
            <div class="strength-bar"></div>
          </div>
        </div>

        <!-- Confirm Password -->
        <div class="form-group">
          <label for="confirmPassword">
            <i class="fas fa-check-circle"></i>
            Confirm Password
          </label>
          <div class="password-input-wrapper">
            <input
              type="password"
              id="confirmPassword"
              name="confirmPassword"
              placeholder="Repeat your password"
              required
              minlength="6"
            />
          </div>
          <span class="error-message" id="confirmPasswordError"></span>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn btn-primary btn-block" id="registerBtn">
          <span class="btn-text">Create Account</span>
          <div class="spinner-sm" style="display:none"></div>
        </button>
      </form>

      <!-- Divider -->
      <div class="auth-divider">
        <span>or</span>
      </div>

      <!-- CTA -->
      <p class="auth-cta">
        Already have an account?
        <a href="login.html">Sign in</a>
      </p>

      <a href="index.html" class="back-link">
        <i class="fas fa-arrow-left"></i> Back to Home
      </a>
    </div>
  </div>

  <script src="js/api.js"></script>
  <script src="js/auth.js"></script>
</body>
</html>
